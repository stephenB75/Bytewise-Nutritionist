<!DOCTYPE html>
<html>
<head>
    <title>Fix Meal Dates</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .result { margin: 10px 0; padding: 10px; border-left: 3px solid #00ff00; }
        .error { color: #ff4444; border-left-color: #ff4444; }
        .warning { color: #ffaa00; border-left-color: #ffaa00; }
        button { padding: 10px 20px; margin: 10px 5px; background: #333; color: #00ff00; border: 1px solid #00ff00; cursor: pointer; }
        button:hover { background: #00ff00; color: #1a1a1a; }
        .disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🛠️ Meal Date Correction Tool</h1>
    <div id="results"></div>
    <div id="actions" style="margin-top: 20px;"></div>
    
    <script>
        function addResult(message, className = '') {
            const div = document.createElement('div');
            div.className = `result ${className}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        function addButton(text, onclick, disabled = false) {
            const button = document.createElement('button');
            button.textContent = text;
            button.onclick = onclick;
            if (disabled) button.className = 'disabled';
            document.getElementById('actions').appendChild(button);
        }

        // Check meal dates and offer correction
        try {
            const weeklyMeals = JSON.parse(localStorage.getItem('weeklyMeals') || '[]');
            
            if (weeklyMeals.length === 0) {
                addResult('No meals found in storage', 'warning');
                return;
            }
            
            const today = new Date();
            const todayKey = today.getFullYear() + '-' + 
                           String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                           String(today.getDate()).padStart(2, '0');
            const yesterdayKey = '2025-08-17';
            
            addResult(`Found ${weeklyMeals.length} total meals`);
            addResult(`Today: ${today.toDateString()} (${todayKey})`);
            
            // Count by date
            let todayCount = 0;
            let yesterdayCount = 0;
            let otherDates = {};
            const yesterdayMeals = [];
            
            weeklyMeals.forEach(meal => {
                let dateKey = 'unknown';
                
                if (meal.date) {
                    if (meal.date.includes('T')) {
                        dateKey = meal.date.split('T')[0];
                    } else if (meal.date.length >= 10) {
                        dateKey = meal.date.substring(0, 10);
                    } else {
                        dateKey = meal.date;
                    }
                }
                
                if (dateKey === todayKey) {
                    todayCount++;
                } else if (dateKey === yesterdayKey) {
                    yesterdayCount++;
                    yesterdayMeals.push(meal);
                } else {
                    if (!otherDates[dateKey]) otherDates[dateKey] = 0;
                    otherDates[dateKey]++;
                }
            });
            
            addResult(`<br><strong>DATE DISTRIBUTION:</strong>`);
            addResult(`✅ Today (${todayKey}): ${todayCount} entries`);
            addResult(`⚠️ Yesterday (${yesterdayKey}): ${yesterdayCount} entries`, yesterdayCount > 0 ? 'warning' : '');
            
            if (Object.keys(otherDates).length > 0) {
                addResult(`📋 Other dates: ${JSON.stringify(otherDates)}`);
            }
            
            // Show correction options
            if (yesterdayCount > 0 && todayCount === 0) {
                addResult('<br><strong>🔧 CORRECTION AVAILABLE:</strong>', 'warning');
                addResult(`Found ${yesterdayCount} entries dated August 17th that should be moved to August 18th`, 'warning');
                
                addResult('<br><strong>August 17th entries to be moved:</strong>', 'warning');
                yesterdayMeals.forEach((meal, index) => {
                    addResult(`${index + 1}. ${meal.name || 'Unnamed meal'} - ${meal.totalCalories || 0} cal`, 'warning');
                });
                
                addButton('Move Entries to August 18th', () => {
                    let correctedCount = 0;
                    const updatedMeals = weeklyMeals.map(meal => {
                        if (meal.date && meal.date.includes(yesterdayKey)) {
                            const timePart = meal.date.includes('T') ? meal.date.split('T')[1] : '';
                            meal.date = timePart ? `${todayKey}T${timePart}` : todayKey;
                            correctedCount++;
                        }
                        return meal;
                    });
                    
                    // Save corrected data
                    localStorage.setItem('weeklyMeals', JSON.stringify(updatedMeals));
                    localStorage.setItem('weeklyMeals_backup', JSON.stringify(updatedMeals));
                    localStorage.setItem('weeklyMeals_lastCorrection', new Date().toISOString());
                    
                    addResult(`<br>✅ <strong>CORRECTION COMPLETE!</strong>`);
                    addResult(`Moved ${correctedCount} meals from August 17th to August 18th`);
                    addResult('All entries now correctly dated for today');
                    
                    // Trigger refresh
                    window.dispatchEvent(new CustomEvent('refresh-weekly-data'));
                    addResult('🔄 UI refresh triggered - check your weekly summary!');
                    
                    // Disable button
                    document.querySelectorAll('button').forEach(btn => {
                        btn.disabled = true;
                        btn.className = 'disabled';
                    });
                });
                
            } else if (todayCount > 0) {
                addResult('<br>✅ <strong>DATES ARE CORRECT!</strong>');
                addResult(`All ${todayCount} entries are properly dated for today (August 18th)`);
                
            } else {
                addResult('<br>⚪ No entries found for today or yesterday', 'warning');
                addResult('Entries may be dated differently or stored elsewhere', 'warning');
            }
            
            // Always offer refresh option
            addButton('Refresh Weekly Summary', () => {
                window.dispatchEvent(new CustomEvent('refresh-weekly-data'));
                addResult('<br>🔄 Weekly summary refresh triggered');
            });
            
        } catch (error) {
            addResult(`Error: ${error.message}`, 'error');
        }
    </script>
</body>
</html>
