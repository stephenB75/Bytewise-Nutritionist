<!DOCTYPE html>
<html>
<head>
    <title>ByteWise Debug Test</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px;
            background: linear-gradient(45deg, #10b981, #3b82f6);
            color: white;
            text-align: center;
        }
        .indicator {
            background: #ef4444;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            margin: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>🍎 ByteWise Nutrition Tracker</h1>
    <div class="indicator">DEBUG TEST PAGE - IF YOU SEE THIS, SERVER IS WORKING</div>
    <p>Server is running on port 5000</p>
    <p>Time: <span id="time"></span></p>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
        setInterval(() => {
            document.getElementById('time').textContent = new Date().toLocaleString();
        }, 1000);
    </script>
</body>
</html>
