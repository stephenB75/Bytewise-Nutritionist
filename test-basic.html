<!DOCTYPE html>
<html>
<head>
    <title>Basic React Test</title>
</head>
<body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script>
        const { createElement } = React;
        const { createRoot } = ReactDOM;
        
        const root = createRoot(document.getElementById('root'));
        root.render(
            createElement('div', {
                style: {
                    minHeight: '100vh',
                    backgroundColor: '#000',
                    color: '#fff',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    flexDirection: 'column',
                    fontSize: '24px'
                }
            }, [
                createElement('h1', { 
                    key: 'title',
                    style: { color: '#faed39', marginBottom: '20px' } 
                }, 'ByteWise Nutritionist - External CDN Test'),
                createElement('p', { key: 'test' }, 'React from CDN works!'),
                createElement('div', {
                    key: 'success',
                    style: {
                        padding: '20px',
                        background: 'green',
                        borderRadius: '10px',
                        marginTop: '20px'
                    }
                }, '✅ React Working via CDN')
            ])
        );
    </script>
</body>
</html>
