<!DOCTYPE html>
<html>
<head>
    <title>Quick Date Fix</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .button { padding: 15px 25px; margin: 10px; background: #333; color: #00ff00; border: 1px solid #00ff00; cursor: pointer; font-size: 16px; }
        .button:hover { background: #00ff00; color: #1a1a1a; }
        .status { margin: 10px 0; padding: 10px; border-left: 3px solid #00ff00; }
    </style>
</head>
<body>
    <h1>📅 Quick Food Entry Date Fix</h1>
    <p>Your food entries are on August 17th but should be on August 18th (today).</p>
    
    <button class="button" onclick="fixDates()">Move All Entries to Today (August 18th)</button>
    
    <div id="status"></div>
    
    <script>
        function addStatus(message) {
            const div = document.createElement('div');
            div.className = 'status';
            div.innerHTML = message;
            document.getElementById('status').appendChild(div);
        }
        
        function fixDates() {
            const weeklyMeals = JSON.parse(localStorage.getItem('weeklyMeals') || '[]');
            const yesterdayKey = '2025-08-17';
            const todayKey = '2025-08-18';
            
            let correctedCount = 0;
            const updatedMeals = weeklyMeals.map(meal => {
                if (meal.date && meal.date.includes(yesterdayKey)) {
                    const timePart = meal.date.includes('T') ? meal.date.split('T')[1] : '';
                    meal.date = timePart ? `${todayKey}T${timePart}` : todayKey;
                    correctedCount++;
                }
                return meal;
            });
            
            if (correctedCount > 0) {
                localStorage.setItem('weeklyMeals', JSON.stringify(updatedMeals));
                localStorage.setItem('weeklyMeals_backup', JSON.stringify(updatedMeals));
                
                addStatus(`✅ SUCCESS! Moved ${correctedCount} food entries to today (August 18th)`);
                addStatus('🔄 Refreshing weekly summary...');
                
                // Trigger refresh
                window.dispatchEvent(new CustomEvent('refresh-weekly-data'));
                
                addStatus('✅ Complete! Check your weekly summary - entries should now show for today.');
                
                // Disable button
                document.querySelector('button').disabled = true;
                document.querySelector('button').textContent = 'Fixed!';
                
            } else {
                addStatus('⚠️ No entries found on August 17th to move.');
            }
        }
        
        // Check current status on load
        window.onload = function() {
            const weeklyMeals = JSON.parse(localStorage.getItem('weeklyMeals') || '[]');
            const yesterdayCount = weeklyMeals.filter(meal => meal.date && meal.date.includes('2025-08-17')).length;
            const todayCount = weeklyMeals.filter(meal => meal.date && meal.date.includes('2025-08-18')).length;
            
            addStatus(`Found ${yesterdayCount} entries on August 17th (should be moved)`);
            addStatus(`Found ${todayCount} entries on August 18th (correct)`);
        };
    </script>
</body>
</html>
