<!DOCTYPE html>
<html>
<head>
    <title>Test LocalStorage</title>
</head>
<body>
    <h1>LocalStorage Test</h1>
    <div id="output"></div>
    <script>
        // Simulate some test data in localStorage
        const testData = {
            "2025-01-11": {
                meals: {
                    breakfast: [
                        { id: "1", name: "Oatmeal", calories: 150, protein: 5, carbs: 27, fat: 3, time: "08:00" },
                        { id: "2", name: "Greek Yogurt", calories: 130, protein: 15, carbs: 10, fat: 4, time: "08:30" }
                    ],
                    lunch: [
                        { id: "3", name: "Chicken Salad", calories: 350, protein: 30, carbs: 15, fat: 20, time: "12:30" }
                    ]
                }
            },
            "2025-01-10": {
                meals: {
                    breakfast: [
                        { id: "4", name: "Eggs", calories: 140, protein: 12, carbs: 1, fat: 10, time: "07:30" }
                    ],
                    dinner: [
                        { id: "5", name: "Salmon", calories: 280, protein: 35, carbs: 0, fat: 15, time: "19:00" }
                    ]
                }
            }
        };

        // Store in weeklyMeals since that's what exists
        localStorage.setItem('weeklyMeals', JSON.stringify(testData));
        
        // Display what was stored
        document.getElementById('output').innerHTML = `
            <h2>Data stored in localStorage:</h2>
            <pre>${JSON.stringify(testData, null, 2)}</pre>
            <p>Stored under key: 'weeklyMeals'</p>
        `;
    </script>
</body>
</html>
