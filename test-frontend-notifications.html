<!DOCTYPE html>
<html>
<head>
    <title>Frontend Notification Test</title>
    <style>
        .test-result { padding: 10px; margin: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h2>Frontend Notification System Test</h2>
    <div id="results"></div>
    
    <script>
        async function testAuthNotifications() {
            const results = document.getElementById('results');
            
            try {
                console.log('🧪 Testing authentication notification system...');
                
                const response = await fetch('/api/auth/signin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'nonexistent@test.com', password: 'wrongpass' })
                });
                
                const data = await response.json();
                
                const testResult = `
                    <div class="test-result ${response.ok ? 'success' : 'error'}">
                        <h3>Authentication Test Results</h3>
                        <p><strong>Status:</strong> ${response.status} (${response.ok ? 'OK' : 'ERROR'})</p>
                        <p><strong>Error Code:</strong> ${data.code || 'None'}</p>
                        <p><strong>Message:</strong> ${data.message || 'None'}</p>
                        <p><strong>Expected:</strong> Should show "Account Not Found" notification</p>
                        <p><strong>Frontend Should:</strong> Go to ERROR branch and show notification</p>
                    </div>
                `;
                
                results.innerHTML = testResult;
                
                // Simulate what the frontend should do
                if (!response.ok && data.code === 'ACCOUNT_NOT_FOUND') {
                    results.innerHTML += `
                        <div class="test-result success">
                            <h3>✅ Notification Logic Test</h3>
                            <p>Frontend should show: <strong>"Account Not Found"</strong> notification</p>
                            <p>Message: "${data.message} Would you like to create a new account?"</p>
                            <p>Auto-switch to sign-up after 2 seconds</p>
                        </div>
                    `;
                } else {
                    results.innerHTML += `
                        <div class="test-result error">
                            <h3>❌ Test Failed</h3>
                            <p>Expected ACCOUNT_NOT_FOUND error code but got: ${data.code}</p>
                        </div>
                    `;
                }
                
            } catch (error) {
                results.innerHTML += `
                    <div class="test-result error">
                        <h3>❌ Test Error</h3>
                        <p>Error: ${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Run test when page loads
        window.addEventListener('load', testAuthNotifications);
    </script>
</body>
</html>
