# fly.toml app configuration file generated for bytewise-nutritionist
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "bytewise-nutritionist"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"

[machines]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[statics]]
  guest_path = "/app/client/dist"
  url_prefix = "/"