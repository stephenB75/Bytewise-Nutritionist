<!DOCTYPE html>
<html>
<head>
    <title>Check Food Entry Dates</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #00ff00; }
        .result { margin: 5px 0; padding: 5px; }
        .date-group { margin: 15px 0; padding: 10px; border-left: 3px solid #00ff00; }
        .today { background: #003300; }
        .other { background: #330000; }
    </style>
</head>
<body>
    <h1>📅 Food Entry Date Checker</h1>
    <div id="results"></div>
    
    <script>
        function addResult(message, className = '') {
            const div = document.createElement('div');
            div.className = `result ${className}`;
            div.innerHTML = message;
            document.getElementById('results').appendChild(div);
        }

        // Check food entry dates
        try {
            const weeklyMeals = JSON.parse(localStorage.getItem('weeklyMeals') || '[]');
            
            addResult(`Found ${weeklyMeals.length} total meals in storage`);
            
            if (weeklyMeals.length === 0) {
                addResult('No meals found in localStorage', 'other');
                return;
            }
            
            // Group by date
            const mealsByDate = {};
            
            weeklyMeals.forEach((meal, index) => {
                let dateKey = 'unknown';
                let displayTime = 'unknown time';
                
                if (meal.date) {
                    if (meal.date.includes('T')) {
                        const parts = meal.date.split('T');
                        dateKey = parts[0];
                        displayTime = parts[1]?.substring(0, 8) || 'unknown time';
                    } else if (meal.date.length >= 10) {
                        dateKey = meal.date.substring(0, 10);
                    } else {
                        dateKey = meal.date;
                    }
                }
                
                if (!mealsByDate[dateKey]) {
                    mealsByDate[dateKey] = [];
                }
                
                mealsByDate[dateKey].push({
                    name: meal.name || 'Unnamed meal',
                    calories: meal.totalCalories || 0,
                    time: displayTime,
                    mealType: meal.mealType || 'unknown',
                    originalDate: meal.date
                });
            });
            
            // Get today's date
            const today = new Date();
            const todayKey = today.getFullYear() + '-' + 
                           String(today.getMonth() + 1).padStart(2, '0') + '-' + 
                           String(today.getDate()).padStart(2, '0');
            
            addResult(`<br><strong>Today is: ${today.toDateString()} (${todayKey})</strong>`);
            
            // Sort dates
            const sortedDates = Object.keys(mealsByDate).sort().reverse();
            
            addResult(`<br><strong>Found entries for ${sortedDates.length} different dates:</strong>`);
            
            sortedDates.forEach(dateKey => {
                const meals = mealsByDate[dateKey];
                const isToday = dateKey === todayKey;
                const className = isToday ? 'today date-group' : 'other date-group';
                
                let displayDate;
                if (dateKey !== 'unknown' && dateKey.length === 10) {
                    const dateObj = new Date(dateKey + 'T00:00:00');
                    const dayName = dateObj.toLocaleDateString('en-US', { weekday: 'long' });
                    displayDate = `${dayName} ${dateObj.toLocaleDateString('en-US', { 
                        month: 'short', 
                        day: 'numeric',
                        year: 'numeric'
                    })} (${dateKey})`;
                } else {
                    displayDate = dateKey;
                }
                
                let content = `<strong>${isToday ? '🎯 TODAY: ' : '📅 '}${displayDate}</strong><br>`;
                content += `${meals.length} entries:<br>`;
                
                meals.forEach((meal, index) => {
                    content += `&nbsp;&nbsp;${index + 1}. <strong>${meal.name}</strong> - ${meal.calories} cal (${meal.mealType}) at ${meal.time}<br>`;
                    if (meal.name.toLowerCase().includes('pellegrino') || 
                        meal.name.toLowerCase().includes('cheez')) {
                        content += `&nbsp;&nbsp;&nbsp;&nbsp;↳ <em>Matches user's mentioned foods</em><br>`;
                    }
                });
                
                const resultDiv = document.createElement('div');
                resultDiv.className = className;
                resultDiv.innerHTML = content;
                document.getElementById('results').appendChild(resultDiv);
            });
            
            // Summary
            if (mealsByDate[todayKey]) {
                addResult(`<br><strong>✅ FOUND ${mealsByDate[todayKey].length} ENTRIES FOR TODAY</strong>`, 'today');
            } else {
                addResult(`<br><strong>⚠️ NO ENTRIES FOUND FOR TODAY</strong>`, 'other');
                addResult(`Most recent entries are from: ${sortedDates[0]}`, 'other');
            }
            
        } catch (error) {
            addResult(`Error checking dates: ${error.message}`, 'other');
        }
    </script>
</body>
</html>
